<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Dashboard</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="dashboard">
    <h1>Welcome to Your Bank 💳</h1>

    <div class="card-container">
        <div class="card">
            <h3>Balance</h3>
            <p>₹50,000</p>
        </div>

        <div class="card">
            <h3>Transfer</h3>
            <p>Send Money</p>
        </div>

        <div class="card">
            <h3>Transactions</h3>
            <p>View History</p>
        </div>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
